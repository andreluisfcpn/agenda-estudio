  <!-- Boot splash: aparece instantaneamente (antes do bundle) e é substituído quando o React monta -->
  <style>
    #boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #001e26;
      z-index: 9999;
      animation: boot-fade-in 0.4s ease-out both;
    }

    #boot-splash img {
      width: min(78vw, 420px);
      height: auto;
      animation: boot-pulse 1.8s ease-in-out infinite;
    }

    @keyframes boot-fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes boot-pulse {
      0%, 100% { opacity: 0.85; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot-splash img { animation: none; }
    }
  </style>
</head>

<body>
  <div id="root" aria-label="Aplicação principal">
    <div id="boot-splash">
      <img src="/icons/logo-branca.svg" alt="Búzios Digital" width="420" height="132" />
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
