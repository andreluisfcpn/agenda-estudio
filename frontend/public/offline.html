<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#001e26" />
    <title>Sem Conexão — Estúdio Búzios Digital</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #001e26;
            color: #F4F9FA;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(17,129,155,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -20%;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(9,110,133,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 380px;
            position: relative;
            z-index: 1;
        }

        /* Animated wifi-off icon */
        .icon-container {
            width: 96px;
            height: 96px;
            margin: 0 auto 32px;
            border-radius: 24px;
            background: rgba(17,129,155,0.08);
            border: 1px solid rgba(17,129,155,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(17,129,155,0.1); }
            50% { box-shadow: 0 0 0 16px rgba(17,129,155,0); }
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
            color: #11819B;
            opacity: 0.8;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        p {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            background: linear-gradient(135deg, #11819B 0%, #096E85 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(17,129,155,0.3);
            -webkit-tap-highlight-color: transparent;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(17,129,155,0.4);
        }
        .retry-btn:active {
            transform: scale(0.97);
        }

        .retry-btn svg {
            width: 18px;
            height: 18px;
        }

        .brand {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 600;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Scanning line animation */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(17,129,155,0.3), transparent);
            animation: scanDown 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes scanDown {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>

    <div class="container">
        <div class="icon-container">
            <!-- Lucide wifi-off icon inline SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h.01"/>
                <path d="M8.5 16.429a5 5 0 0 1 7 0"/>
                <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
                <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
                <path d="M16.85 11.25a10 10 0 0 0-2.22-1.5"/>
                <path d="M5 12.859a10 10 0 0 1 5.17-2.69"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
        </div>

        <h1>Sem conexão</h1>
        <p>
            Você está offline no momento. Verifique sua conexão com a internet e tente novamente.
        </p>

        <button class="retry-btn" onclick="window.location.reload()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 16H3v5"/>
            </svg>
            Tentar novamente
        </button>
    </div>

    <div class="brand">Estúdio Búzios Digital</div>
</body>
</html>
