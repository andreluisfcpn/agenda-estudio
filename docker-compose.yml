version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studio_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio_secret
      POSTGRES_DB: studio_scheduler
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: studio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
